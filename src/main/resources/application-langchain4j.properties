# LangChain4j Configuration - REQUIRES OPENAI_API_KEY environment variable
langchain4j.open-ai.chat-model.api-key=${OPENAI_API_KEY}
langchain4j.open-ai.chat-model.model-name=gpt-4o-mini
langchain4j.open-ai.chat-model.temperature=0.7
langchain4j.open-ai.chat-model.max-tokens=1000
langchain4j.open-ai.chat-model.timeout=30s
langchain4j.open-ai.chat-model.max-retries=3

# Enable debug logging for LangChain4j
logging.level.dev.langchain4j=DEBUG

# TaskAgent Configuration
langchain4j.task-agent.name=TaskAgent
langchain4j.task-agent.description=Can perform create operations for a user's tasks by understanding the user's goals and generating or deleting tasks based on the user's goals. Can read the user's goals and generate tasks based on the user's goals. 