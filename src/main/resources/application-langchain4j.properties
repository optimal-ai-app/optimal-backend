# LangChain4j Configuration - REQUIRES OPENAI_API_KEY environment variable
langchain4j.open-ai.chat-model.api-key=${OPENAI_API_KEY}
langchain4j.open-ai.chat-model.temperature=0.2
langchain4j.open-ai.chat-model.max-tokens=1000
langchain4j.open-ai.chat-model.timeout=30s
langchain4j.open-ai.chat-model.max-retries=3

# Enable debug logging for LangChain4j
logging.level.dev.langchain4j=DEBUG

# TaskAgent Configuration
# Task Management Agents - Independent from Goal Management
langchain4j.task-planner-agent.name=TaskPlannerAgent
langchain4j.task-planner-agent.description=Independently plans and suggests tasks based on any input, whether from goals or direct user requests. Works autonomously to break down objectives into actionable tasks.

langchain4j.task-creator-agent.name=TaskCreatorAgent
langchain4j.task-creator-agent.description=Creates and structures individual tasks based on task planner suggestions or direct user input. Depends on the TaskPlannerAgent's output.

# Goal Management Agent - Independent from Task Management
langchain4j.goal-creator-agent.name=GoalCreatorAgent
langchain4j.goal-creator-agent.description=Specializes exclusively in helping users define and articulate their high-level goals and aspirations. Does not handle task planning or creation.

# Habit Management Agent
langchain4j.habit-agent.name=HabitAgent
langchain4j.habit-agent.description=Creates and manages habits (type, cadence RRULE, adherence, verification, notifications), seeds recurring actions, and logs completions.