server:
  http2:
    enabled: true

spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${SPRING_DATASOURCE_URL:}
    username: ${SPRING_DATASOURCE_USERNAME:}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    hikari:
      # Fix for PostgreSQL prepared statement conflicts
      # Clear prepared statements when connection is checked out from pool
      # This prevents "prepared statement already exists" errors
      connection-init-sql: "DEALLOCATE ALL"
      # Connection pool settings
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      # Disable server-side prepared statements via connection properties
      # This is the primary fix - prevents PostgreSQL from caching prepared statements
      data-source-properties:
        prepareThreshold: 0
  jpa:
    hibernate:
      ddl-auto: update

    # Add this so Hibernate knows which Dialect to use without probing
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        # Disable server-side prepared statement cache to avoid conflicts
        # This works together with prepareThreshold: 0
        jdbc:
          use_server_prepared_statement_cache: false
          # Keep batching enabled for better performance on bulk operations
          # (saveAll operations will still benefit from batching)
          batch_size: 20
          batch_versioned_data: true

  jta:
    enabled: false
  security:
    oauth2:
      resourceserver:
        jwt:
          secret-key: ${supabase.jwtSecret}

springdoc:
  show-actuator: true

# application.yml
langchain4j:
  open-ai:
    chat-model:
      api-key: ${OPENAI_API_KEY}
  gemini:
    chat-model:
      api-key: ${GEMINI_API_KEY}
  task-planner-agent:
    name: TaskPlannerAgent
    description: "Can plan tasks for a user given details about a goal."
  task-creator-agent:
    name: TaskCreatorAgent
    description: "Can create tasks for a user given details about the task from the task planner."
  goal-creator-agent:
    name: GoalCreatorAgent
    description: "Can create goals for a user by helping the user figure out their aspirations and use that to fulfill their ambitions."
  milestone-planner-agent:
    name: MilestonePlannerAgent
    description: "Helps the user plan milestones for their goals. Part of the MilestoneExecutionTeam."
  milestone-task-creator-agent:
    name: MilestoneTaskCreatorAgent
    description: "Creates milestone tasks based on milestone planning data from MilestonePlannerAgent. Specializes exclusively in milestone task creation. Depends on MilestonePlannerAgent."
  diary-log-agent:
    name: DiaryLogAgent
    description: "Can analyze diary log transcripts to generate summaries and relevant tags, and identify goals and tasks that need to be updated."
  habit-agent:
    name: HabitAgent
    description: "Creates and manages habits (type, cadence RRULE, adherence, verification, notifications), seeds recurring actions, and logs completions."

management:
  endpoint:
    health:
      show-details: ALWAYS
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: "*"

logging:
  level:
    org.springframework: INFO
    org.springframework.security: DEBUG
    org.springframework.security.oauth2: DEBUG
    org.springframework.web.filter: DEBUG
    com.optimal.backend.springboot: DEBUG
    com.optimal.backend.springboot.configuration.RequestLoggingConfig: INFO
    root: INFO

## Supabase Configuration
supabase:
  url: ${SUPABASE_URL}
  anonKey: ${SUPABASE_ANON_KEY}
  jwtSecret: ${SUPABASE_JWT_SECRET}

swagger:
  contact-name: Optimal AI
  contact-mail: optimal.ai.app@gmail.com
  contact-url: https://optimal.ai
  app-name: Optimal.ai
  app-description: "Optimal.ai is a project that helps you to achieve your goals."
  app-version: 1.0.0
  app-license-url: https://www.apache.org/licenses/LICENSE-2.0.html
  app-license: Apache 2.0
