server:
  http2:
    enabled: true

spring:
  datasource:
    # Replace with your Optimal app’s PostgreSQL connection (e.g., Supabase or Docker)
    url: jdbc:postgresql://${POSTGRES_DB_SERVER_ADDRESS:localhost}:${POSTGRES_DB_SERVER_PORT:5432}/optimal_db?sslmode=require
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:example}
    hikari:
      pool-name: OptimalHikariPool
  jpa:
    hibernate:
      ddl-auto: update # use 'update' in development; switch to 'validate' or migrations in production
    open-in-view: false
  jta:
    enabled: false

springdoc:
  show-actuator: true

management:
  endpoint:
    health:
      show-details: ALWAYS
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: '*'

logging:
  level:
    org.springframework: INFO
    com.optimal.backend.springboot: INFO

jwt:
  # Replace with a strong secret (e.g., from environment) and your own issuer
  secretKey: ${JWT_SECRET:changeThisToAStrongSecret}
  issuer: optimal.yourdomain.com
  expirationMinute: 86400 # tokens valid for 60 days

swagger:
  contact-name: Optimal Backend Team
  contact-mail: backend@optimal.app
  contact-url: https://optimal.app/docs
  app-name: Optimal Backend API
  app-description: >
    “Optimal” is the backend service for the Optimal application. 
    This project includes Spring Boot, Spring Data JPA, validation, 
    Spring Security + JWT, PostgreSQL, MapStruct, Lombok, and OpenAPI.
  app-version: 1.0.0
  app-license-url: https://www.apache.org/licenses/LICENSE-2.0.html
  app-license: Apache 2.0
